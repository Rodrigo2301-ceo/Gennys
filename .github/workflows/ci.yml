name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/gennys_ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-only-placeholder-not-used-outside-this-job
      SECURITY_HMAC_SECRET: ci-independent-placeholder-not-used-outside-this-job

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install reproducibly
        run: npm ci --no-fund --no-audit

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Production build
        run: npm run build

      # A major upgrade of Next.js is tracked separately. Until then, CI blocks
      # critical production advisories and reports the remaining high findings.
      - name: Dependency audit policy
        run: npm run audit:ci
